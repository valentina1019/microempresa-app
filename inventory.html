<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inventario</title>
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <div class="container panel">
      <p class="eyebrow">Modulo de inventario</p>
      <h1>Inventario</h1>

      <form action="inventory.php" method="POST">
        <input type="text" name="nombre" placeholder="Producto" required />

        <input
          type="number"
          name="stock"
          placeholder="Stock"
          min="0"
          required
        />

        <input
          type="number"
          name="precio"
          placeholder="Precio"
          min="0"
          step="0.01"
          required
        />

        <button type="submit">Guardar</button>
      </form>

      <div class="view-actions">
        <a class="button-link" href="inventario-list.php">Ver listado</a>
        <a class="button-link secondary" href="dashboard.html">Volver</a>
      </div>
    </div>
  </body>
</html>
